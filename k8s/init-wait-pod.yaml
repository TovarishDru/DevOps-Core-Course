apiVersion: v1
kind: Pod
metadata:
  name: init-wait-demo
  labels:
    app: init-wait-demo
spec:
  initContainers:
    - name: wait-for-service
      image: busybox:1.36
      command:
        - 'sh'
        - '-c'
        - 'until nslookup myservice.default.svc.cluster.local; do echo "Waiting for myservice..."; sleep 2; done'
  containers:
    - name: main-app
      image: busybox:1.36
      command: ['sh', '-c', 'echo "Service is available!" && sleep 3600']
