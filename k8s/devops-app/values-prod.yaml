replicaCount: 5

image:
  repository: tovarishdru/devops-python-app
  tag: "v1.0"
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8000

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "8000"
  - name: DEBUG
    value: "false"
  - name: DATA_DIR
    value: "/data"

config:
  environment: "production"
  logLevel: "WARNING"
  appName: "devops-info-service"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""

resources:
  requests:
    memory: "256Mi"
    cpu: "200m"
  limits:
    memory: "512Mi"
    cpu: "500m"

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 3
  timeoutSeconds: 3
  failureThreshold: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0
