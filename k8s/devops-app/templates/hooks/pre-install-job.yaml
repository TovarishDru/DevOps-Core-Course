apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-app.fullname" . }}-pre-install"
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
    app.kubernetes.io/component: hook
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "devops-app.fullname" . }}-pre-install"
      labels:
        {{- include "devops-app.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: hook
    spec:
      restartPolicy: Never
      containers:
      - name: pre-install-job
        image: busybox:1.36
        command:
          - sh
          - -c
          - |
            echo "========================================="
            echo "Pre-Install Hook: Starting validation"
            echo "========================================="
            echo ""
            echo "Release: {{ .Release.Name }}"
            echo "Namespace: {{ .Release.Namespace }}"
            echo "Chart: {{ .Chart.Name }}-{{ .Chart.Version }}"
            echo "App Version: {{ .Chart.AppVersion }}"
            echo ""
            echo "Performing pre-installation checks..."
            echo "✓ Checking namespace availability"
            echo "✓ Validating configuration"
            echo "✓ Verifying resource quotas"
            echo ""
            sleep 5
            echo "Pre-installation validation completed successfully!"
            echo "========================================="
