replicaCount: 3

image:
  repository: tovarishdru/devops-python-app
  tag: "v1.0"
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 80
  targetPort: 8000
  nodePort: 30080

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "8000"
  - name: DEBUG
    value: "false"
  - name: DATA_DIR
    value: "/data"

config:
  environment: "production"
  logLevel: "INFO"
  appName: "devops-info-service"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

securityContext:
  runAsNonRoot: true
  runAsUser: 999
  runAsGroup: 999
  fsGroup: 999

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

secrets:
  DB_USERNAME: "placeholder-user"
  DB_PASSWORD: "placeholder-pass"
  API_KEY: "placeholder-api-key"

serviceAccount:
  create: true
  name: "devops-app"

vault:
  enabled: false
  role: "devops-app-role"
  secretPath: "secret/data/devops-app/config"
