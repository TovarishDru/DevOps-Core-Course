---
# Tasks for common role - basic system setup

- name: Package installation block
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: "{{ apt_cache_valid_time }}"

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Handle apt cache failure - fix missing packages
      ansible.builtin.command: apt-get update --fix-missing
      changed_when: true

    - name: Retry package installation after fix
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Log package installation completion
      ansible.builtin.copy:
        content: "Common packages installed at {{ ansible_facts['date_time']['iso8601'] }}\n"
        dest: /tmp/common_packages_installed.log
        mode: '0644'

  become: true
  tags:
    - packages
    - common

- name: System configuration block
  block:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone }}"

  always:
    - name: Log system configuration completion
      ansible.builtin.copy:
        content: "System configured at {{ ansible_facts['date_time']['iso8601'] }}\n"
        dest: /tmp/common_config_complete.log
        mode: '0644'

  become: true
  tags:
    - config
    - common