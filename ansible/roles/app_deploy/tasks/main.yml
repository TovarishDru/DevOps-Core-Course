---
# Tasks for app_deploy role - Application deployment with Docker

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ docker_image }}:{{ docker_image_tag }}"
    source: pull
  notify: restart app container

- name: Remove old container if exists
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
    force_kill: yes
  ignore_errors: yes

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: "{{ container_state }}"
    restart_policy: "{{ container_restart_policy }}"
    ports:
      - "{{ app_host_port }}:{{ app_container_port }}"
    env: "{{ app_env_vars }}"
  register: container_result

- name: Display container info
  ansible.builtin.debug:
    msg: "Container {{ app_container_name }} started with ID: {{ container_result.container.Id[:12] }}"
  when: container_result.container is defined

- name: Wait for application to be ready
  ansible.builtin.wait_for:
    port: "{{ app_host_port }}"
    host: "0.0.0.0"
    delay: "{{ health_check_delay }}"
    timeout: "{{ health_check_timeout }}"

- name: Verify health endpoint
  ansible.builtin.uri:
    url: "http://localhost:{{ app_host_port }}{{ health_check_path }}"
    method: GET
    status_code: 200
  register: health_check_result
  retries: 5
  delay: 3
  until: health_check_result.status == 200

- name: Display health check result
  ansible.builtin.debug:
    msg: "Application health check passed! Status: {{ health_check_result.status }}"